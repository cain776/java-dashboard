spring.application.name=analytics

# Local default: run without an external DB
spring.datasource.url=jdbc:h2:mem:analytics;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.h2.console.enabled=${APP_H2_CONSOLE_ENABLED:false}
spring.h2.console.path=/h2-console

# Server
server.port=${SERVER_PORT:19080}
spring.jackson.time-zone=Asia/Seoul

# JWT
# No production-unsafe fallback. Local launch scripts or environment files must provide APP_JWT_SECRET.
app.jwt.secret=${APP_JWT_SECRET:}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:19173}
app.seed.enabled=${APP_SEED_ENABLED:false}
app.seed.admin-login-id=${APP_SEED_ADMIN_LOGIN_ID:admin}
app.seed.admin-email=${APP_SEED_ADMIN_EMAIL:admin@bviit.com}
app.seed.admin-password=${APP_SEED_ADMIN_PASSWORD:}
app.seed.admin-name=${APP_SEED_ADMIN_NAME:관리자}

# Local JSON cache for heavy stats queries
stats.cache.dir=${STATS_CACHE_DIR:.cache/stats}
stats.cache.examination.enabled=${STATS_CACHE_EXAMINATION_ENABLED:true}
