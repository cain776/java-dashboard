# ========================================
# MSSQL Stats DataSource (READ-ONLY)
# Profile: mssql
# ========================================

# 운영 DB — SELECT만 허용, 쓰기 절대 금지
stats.datasource.url=${STATS_DB_URL}
stats.datasource.username=${STATS_DB_USERNAME}
stats.datasource.password=${STATS_DB_PASSWORD}
stats.datasource.driver-class-name=net.sourceforge.jtds.jdbc.Driver

# HikariCP — 최소 풀, READ-ONLY 강제
stats.datasource.hikari.maximum-pool-size=3
stats.datasource.hikari.read-only=true
stats.datasource.hikari.connection-timeout=10000

# JPA는 H2 유지 (User 엔티티) — stats는 별도 JdbcTemplate 사용
# MSSQL 2014 주의: STRING_AGG, TRIM 등 최신 함수 사용 불가
spring.datasource.url=jdbc:h2:mem:analytics;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
