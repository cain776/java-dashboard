services:
  analytics:
    build:
      context: .
      dockerfile: Dockerfile
    image: bviit-analytics:${IMAGE_TAG:-latest}
    container_name: bviit-analytics
    restart: unless-stopped
    ports:
      - "${APP_PORT:-18080}:18080"
    # backend/.env 의 값들이 그대로 컨테이너 환경변수로 주입된다.
    # (없으면 H2 + JWT_SECRET 미설정으로 부팅 실패하므로 반드시 준비)
    env_file:
      - backend/.env
    environment:
      # Spring profile (mssql / postgres / 미지정=H2). backend/.env 가 있으면 기본 mssql.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-mssql}
      SERVER_PORT: "18080"
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost:18080}
      STATS_CACHE_DIR: /app/.cache/stats
    volumes:
      - analytics-cache:/app/.cache

volumes:
  analytics-cache:
